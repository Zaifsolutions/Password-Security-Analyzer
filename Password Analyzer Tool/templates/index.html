<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaif Security 🔐</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="neon-dark">
    <div class="container">
        
        <header class="section-field">
            <h1 class="glow-header">ZAIF SECURITY 🔐</h1>
            <div class="typewriter">Next-Gen Cyber Password Analyzer</div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h2 style="color:var(--primary)"><i class="fa fa-terminal"></i> Analyzer Tool</h2>
                <div style="position:relative; margin-top:20px;">
                    <input type="password" id="pwd" placeholder="Enter Secure Key..." oninput="analyze()">
                    <i class="fa fa-eye" onclick="toggleEye()" style="position:absolute; right:15px; top:18px; cursor:pointer;"></i>
                </div>

                <div class="circle-box">
                    <svg width="160" height="160">
                        <circle class="bg-ring" cx="80" cy="80" r="70"></circle>
                        <circle class="progress-ring" cx="80" cy="80" r="70"></circle>
                    </svg>
                    <div class="circle-data">
                        <h2 id="perc">0%</h2>
                        <small id="status">Waiting</small>
                    </div>
                </div>
                <p id="time" style="text-align:center; font-weight:bold; color:var(--secondary); min-height: 20px;"></p>
                
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn" onclick="generateStrong()"><i class="fa fa-bolt"></i> Generate</button>
                    <button class="btn" id="scanBtn" onclick="triggerFile()"><i class="fa fa-search"></i> Scanner</button>
                    <input type="file" id="fileInput" onchange="scanFile(event)">
                </div>
            </div>

            <div class="card">
                <h2 style="color:var(--secondary)"><i class="fa fa-robot"></i> AI Security Advisor</h2>
                <ul id="hints" style="margin-top:20px; line-height:1.8; list-style: none; padding-left: 0;">
                    <li><i class="fa fa-sync fa-spin"></i> Initializing Security Protocols...</li>
                </ul>
                
                <hr style="border:0.5px solid var(--border); margin:20px 0;">
                
                <h2><i class="fa fa-comments"></i> Feedback & Reporting</h2>
                <textarea placeholder="Submit bugs or feature requests directly to Zaif Solutions..."></textarea>
                <button class="btn" id="feedbackBtn" onclick="submitFeedback()" style="margin-top:10px;">Submit Report</button>
            </div>
        </div>

        <div class="section-field" style="margin-top:25px;">
            <h3>Connect with Zaif Security</h3>
            <div class="social-links">
                <a href="https://wa.me/966540938597" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://t.me/Revengseeker07" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61564216566814" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="mailto:support@zaifsolutions.pro" title="Email"><i class="fa fa-envelope"></i></a>
                <a href="tel:0540938597" title="Call"><i class="fa fa-phone"></i></a>
                <a href="https://zaifsolutions.pro/" target="_blank" title="Website"><i class="fa fa-globe"></i></a>
            </div>
        </div>

        <footer class="section-field">
            <p>Developed by <strong>Huzaifa Mahmood</strong> © 2026</p>
            <p style="font-size:0.8rem; opacity:0.7;">Zaif Security | Advanced Web & Cyber Security Systems</p>
        </footer>

    </div>

    <button onclick="toggleTheme()" style="position:fixed; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; border:none; cursor:pointer; background:var(--secondary); color:black; font-size:1.5rem; z-index:100;">
        <i class="fa fa-moon"></i>
    </button>

    <script src="/static/script.js"></script>
</body>
</html>
